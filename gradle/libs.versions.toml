[versions]
dokka = "1.9.20"
jqwik-kotlin = "1.8.5"
junit-jupiter-engine = "5.10.2"
junit-launcher = "1.10.2"
kotlin = "2.0.0"
kotlinx-coroutines = "1.8.1"
kover = "0.8.0"
netty = "4.1.110.Final"
netty-iouring = "0.0.25.Final"
slf4j-api = "2.0.13"
